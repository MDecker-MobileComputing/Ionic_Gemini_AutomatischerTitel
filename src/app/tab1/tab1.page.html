<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Editor</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Editor</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    <ion-item>
      <ion-input
        label="Titel"
        labelPlacement="stacked"
        placeholder="z. B. Tagesbericht vom 08.05.2026"
        [(ngModel)]="titel"
      ></ion-input>
    </ion-item>

    <br><br>

    <ion-item>
      <ion-textarea
        label="Text"
        labelPlacement="stacked"
        placeholder="Schreibe hier deinen Bericht"
        autoGrow="true"
        rows="12"
        [(ngModel)]="text"
        (ionChange)="onTextChanged($event)"
      ></ion-textarea>
    </ion-item>

    <div class="action-buttons">
      <ion-button
        class="action-button"
        (click)="onButtonErzeugeTitelVorschlag()"
        [disabled]="istTitelWirdGeradeGeneriert"
      >
        {{ istTitelWirdGeradeGeneriert ? 'Erzeuge Titel...' : 'Titel-Vorschlag erzeugen' }}
      </ion-button>

      <ion-button
        class="action-button"
        color="danger"
        (click)="onButtonLoeschen()"
        [disabled]="istTitelWirdGeradeGeneriert"
      >
        Titel und Text löschen
      </ion-button>
    </div>
    
    <ion-item *ngIf="titelFehler" lines="none">
      <ion-note color="danger">{{ titelFehler }}</ion-note>
    </ion-item>

  </ion-list>

</ion-content>
